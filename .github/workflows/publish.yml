name: Publish to NuGet

# Publishes WirePeek to nuget.org using Trusted Publishing (OIDC) — no stored
# API key. Publishing a GitHub Release (e.g. tag `v0.1.1`) releases that version,
# or run manually via the Actions tab with an optional version override.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.1). Leave blank to use the csproj version.'
        required: false

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      id-token: write   # required for the GitHub OIDC token
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $v = '${{ github.event.inputs.version }}'
          if (-not $v) { $v = '${{ github.event.release.tag_name }}' }
          $v = $v -replace '^v', ''
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Pack
        shell: pwsh
        run: |
          $packArgs = @('pack', 'WirePeek.csproj', '-c', 'Release', '-o', 'artifacts')
          $ver = '${{ steps.version.outputs.version }}'
          if ($ver) { $packArgs += "-p:Version=$ver" }
          dotnet @packArgs

      # Exchange the OIDC token for a short-lived nuget.org API key. Runs right
      # before the push so the ~1-hour key does not expire in transit.
      - name: NuGet login (OIDC -> temporary API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push
        shell: pwsh
        run: >
          dotnet nuget push artifacts/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
